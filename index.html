<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çeviri Uygulaması</title>
</head>
<body>
    <h1>Çeviri Uygulaması</h1>
    <textarea id="inputText" placeholder="Çevrilecek metni girin"></textarea>
    <select id="language">
        <option value="en">İngilizce</option>
        <option value="es">İspanyolca</option>
        <option value="fr">Fransızca</option>
        <option value="de">Almanca</option>
    </select>
    <button onclick="translateText()">Çevir</button>
    <h2>Çeviri Sonucu:</h2>
    <p id="outputText"></p>

    <script>
       async function translateText() {
    const text = document.getElementById("inputText").value;
    const targetLang = document.getElementById("language").value;

    const response = await fetch('https://translate-app-yjvw.onrender.com/translate', {  // ✅ Sonuna "/translate" ekledik!
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text, targetLang })
    });

    const data = await response.json();
    document.getElementById("outputText").innerText = data.translatedText;
}

    </script>
</body>
</html>
